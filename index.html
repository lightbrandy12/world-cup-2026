<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pitch: #1b5e20; --pitch-light: #2e7d32; --gold: #c8a84e;
  --gold-light: #f0d78c; --white: #ffffff; --bg: #f5f5f0;
  --card: #ffffff; --text: #1a1a1a; --text-muted: #666;
  --border: #e0d8c8; --accent: #c62828; --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,.08);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ===== Header ===== */
.header {
  background:

    url('https://images.unsplash.com/photo-1459865264687-595d652de67e?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat,
    linear-gradient(135deg, #0d3b0d, #1b5e20);
  color: white; padding: 28px 20px 24px; text-align: center;
  position: relative; overflow: hidden; min-height: 240px;
}
/* 微弱的顶部光晕，提升文字可读性 */
.header::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse at 50% 30%, rgba(255,255,255,.08) 0%, transparent 70%);
}
.header::after { display: none; }
.header-content { position: relative; z-index: 2; }
.header h1 { font-size: clamp(20px, 5vw, 32px); font-weight: 800; letter-spacing: 1px; text-shadow: 0 2px 8px rgba(0,0,0,.4); }
.header h1 .gold { color: #ffe082; }
.header .subtitle { font-size: 13px; opacity: .9; margin-top: 4px; text-shadow: 0 1px 4px rgba(0,0,0,.3); }
.header .dates { font-size: 12px; opacity: .75; margin-top: 2px; }
.header-stats {
  display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;
  margin-top: 10px; font-size: 13px; font-weight: 600;
}
.header-stats span {
  background: rgba(255,255,255,.13); backdrop-filter: blur(4px);
  padding: 4px 14px; border-radius: 16px; white-space: nowrap;
}

/* Countdown */
.countdown-bar {
  display: flex; justify-content: center; gap: 12px; margin-top: 14px; flex-wrap: wrap;
  position: relative; z-index: 2;
}
.countdown-item {
  background: rgba(0,0,0,.25); backdrop-filter: blur(6px);
  border-radius: 12px; padding: 10px 14px; min-width: 60px; text-align: center;
  border: 1px solid rgba(255,255,255,.18);
}
.countdown-item .num { font-size: 26px; font-weight: 800; line-height: 1; }
.countdown-item .label { font-size: 10px; opacity: .8; margin-top: 3px; }

/* 体育卡气泡 */
.sports-card-badge {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; position: relative; z-index: 2;
  background: linear-gradient(135deg, #ff6f00, #ff8f00); color: #fff;
  padding: 8px 18px; border-radius: 24px; font-size: 12px; font-weight: 700;
  box-shadow: 0 3px 14px rgba(255,111,0,.4); animation: badgeBounce 2s ease-in-out infinite;
  cursor: default;
}
@keyframes badgeBounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

/* ===== Tabs ===== */
.tabs { display: flex; gap: 2px; background: #e8e4d8; padding: 4px; margin: 16px 16px 0; border-radius: 10px; overflow-x: auto; }
.tab {
  flex: 1; min-width: 80px; padding: 10px 14px; text-align: center; border-radius: 8px;
  border: none; cursor: pointer; font-size: 14px; font-weight: 600; white-space: nowrap;
  background: transparent; color: var(--text-muted); transition: all .2s;
}
.tab.active { background: var(--pitch); color: white; box-shadow: 0 2px 8px rgba(27,94,32,.3); }
.tab:hover:not(.active) { background: rgba(0,0,0,.05); }

/* ===== Filter Chips ===== */
.filters { padding: 12px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
.filter-chip {
  padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--card); font-size: 13px; cursor: pointer; transition: all .2s;
  white-space: nowrap; color: var(--text-muted);
}
.filter-chip.active { background: var(--pitch); color: white; border-color: var(--pitch); }
.filter-chip:hover:not(.active) { border-color: var(--pitch); color: var(--pitch); }

/* ===== Match List ===== */
.match-list { padding: 0 16px 80px; max-width: 800px; margin: 0 auto; }

/* Date divider */
.date-divider {
  display: flex; align-items: center; gap: 12px; margin: 20px 0 12px;
  color: var(--text-muted); font-size: 13px; font-weight: 600;
}
.date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Match card */
.match-card {
  background: var(--card); border-radius: var(--radius); padding: 16px;
  margin-bottom: 10px; box-shadow: var(--shadow); cursor: default;
  transition: transform .15s, box-shadow .15s; position: relative; overflow: hidden;
  border-left: 4px solid transparent;
}
.match-card:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,.12); }
.match-card.stage-group { border-left-color: #4caf50; }
.match-card.stage-r32  { border-left-color: #2196f3; }
.match-card.stage-r16  { border-left-color: #ff9800; }
.match-card.stage-qf   { border-left-color: #9c27b0; }
.match-card.stage-sf   { border-left-color: #e91e63; }
.match-card.stage-3rd  { border-left-color: #607d8b; }
.match-card.stage-final { border-left-color: #c8a84e; }

.match-meta {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
  font-size: 12px; color: var(--text-muted);
}
.match-meta .stage-badge {
  background: var(--pitch); color: white; padding: 2px 10px; border-radius: 4px;
  font-weight: 700; font-size: 13px;
}
.group-prefix {
  display: inline-block; background: #e8f5e9; color: var(--pitch);
  padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 700;
  margin-right: 2px; vertical-align: middle;
}
.match-teams { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.team {
  flex: 1; text-align: center; font-weight: 700; font-size: 15px; line-height: 1.3;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.flag-img {
  width: 40px; height: 28px; border-radius: 3px; box-shadow: 0 1px 3px rgba(0,0,0,.15);
  object-fit: cover; display: block;
}
.team .name { display: block; }
.match-vs { font-size: 13px; color: var(--text-muted); font-weight: 600; flex-shrink: 0; }
.match-info {
  margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0ebe0;
  display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted);
  flex-wrap: wrap; gap: 4px;
}
.match-story {
  margin-top: 10px; padding: 8px 12px; background: #fdfaf3; border-radius: 6px;
  font-size: 12px; color: #5d4e37; line-height: 1.6; text-align: center;
  border-bottom: 2px solid var(--gold-light);
}
.match-info .venue { display: flex; align-items: center; gap: 4px; }
.match-info .time-local { font-weight: 600; color: var(--accent); }

/* Live dot */
.live-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #f44336;
  display: inline-block; animation: pulse 1.5s infinite; margin-right: 4px;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Past match */
.match-card.past { opacity: .6; }

/* ===== Knockout Bracket ===== */
.bracket-container { overflow-x: auto; padding: 16px 0 40px; }
.bracket { display: flex; gap: 8px; min-width: max-content; padding: 0 16px; }
.bracket-col { display: flex; flex-direction: column; gap: 6px; min-width: 170px; }
.bracket-col-header {
  font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 4px; text-align: center; letter-spacing: .5px;
}
.bracket-match {
  background: var(--card); border-radius: 8px; padding: 10px 12px;
  box-shadow: var(--shadow); font-size: 12px; position: relative;
  border-left: 3px solid var(--border); min-height: 54px;
  display: flex; flex-direction: column; justify-content: center; gap: 2px;
}
.bracket-match .bm-slot { color: var(--text-muted); font-size: 10px; }
.bracket-match .bm-teams { font-weight: 600; font-size: 13px; }
.bracket-match .bm-info { font-size: 10px; color: var(--text-muted); }
.bracket-col.r32 .bracket-match { border-left-color: #2196f3; }
.bracket-col.r16 .bracket-match { border-left-color: #ff9800; }
.bracket-col.qf   .bracket-match { border-left-color: #9c27b0; }
.bracket-col.sf   .bracket-match { border-left-color: #e91e63; }
.bracket-col.final .bracket-match { border-left-color: var(--gold); background: linear-gradient(135deg, #fffef5, #fff8e1); }

.bracket-label {
  text-align: center; font-size: 11px; font-weight: 700; color: var(--gold);
  margin-top: 6px; letter-spacing: 1px;
}

/* ===== Venue Section ===== */
.venue-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px; padding: 8px 0; }
.venue-card {

}
.venue-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.12); }
.venue-card .vc-icon { font-size: 24px; }
.venue-card .vc-name { font-weight: 600; color: var(--pitch); }
.venue-card .vc-hint { font-size: 10px; color: #aaa; margin-top: 2px; }
.venue-card .vc-city { color: var(--text-muted); font-size: 11px; }

/* ===== Venue Modal ===== */
.venue-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 1000;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  animation: fadeIn .3s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.venue-modal {
  background: white; border-radius: 14px; max-width: 640px; width: 100%;
  overflow: hidden; animation: slideUp .3s;

@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.venue-modal-header {
  padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid #eee;

.venue-modal-header h3 { font-size: 17px; margin: 0; }
.venue-modal-close {

.venue-modal-close:hover { color: #333; }
.venue-modal-img {

  background: #e8e8e8;

.venue-modal-loader {
  height: 320px; display: flex; align-items: center; justify-content: center;
  color: #999; font-size: 14px;

.venue-modal-info {
  padding: 12px 18px 16px; font-size: 13px; color: var(--text-muted);
  line-height: 1.6;

/* ===== Stats ===== */
.stats-bar {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  padding: 12px 16px; font-size: 13px; color: var(--text-muted);
}
.stats-bar span { font-weight: 700; color: var(--text); }

/* ===== Footer ===== */
.footer {
  text-align: center; padding: 24px 16px; font-size: 12px; color: var(--text-muted);
  border-top: 1px solid var(--border);
}

/* ===== Responsive ===== */
@media (max-width: 600px) {
  .header { padding: 20px 8px 18px; min-height: 200px; }

  .header .subtitle { font-size: 11px; }

  .match-teams { gap: 4px; }
  .team { font-size: 13px; }
  .flag-img { width: 32px; height: 22px; }
  .tabs { margin: 12px 8px 0; }
  .match-list { padding: 0 8px 80px; }
  .match-story { font-size: 11px; padding: 6px 8px; }
  .venue-modal { max-width: 95vw; }
  .venue-modal-img { height: 200px; }
  .venue-modal-loader { height: 200px; font-size: 12px; }
}

// ===== RENDER =====
function getNowBJ() {
  // Beijing is UTC+8
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  return new Date(utc + 8 * 3600000);
}

function parseDateBJ(dateStr, timeStr) {
  const [m, d] = dateStr.replace('月',' ').replace('日','').trim().split(/\s+/);
  const [h, min] = timeStr.split(':');
  // Month: 6 or 7
  return new Date(2026, parseInt(m) - 1, parseInt(d), parseInt(h), parseInt(min), 0);
}

function isPastMatch(m) {
  const dt = parseDateBJ(m[0], m[1]);
  return dt < getNowBJ();
}

function isLiveMatch(m) {
  const start = parseDateBJ(m[0], m[1]);
  const end = new Date(start.getTime() + 2.5 * 3600000); // ~2.5h match
  const now = getNowBJ();
  return now >= start && now <= end;
}

function getCleanName(teamStr) {
  // 从 "🇲🇽 墨西哥" 或 "墨西哥" 中提取国家名
  const parts = teamStr.split(' ');
  return parts[parts.length - 1];
}

function getFlagImg(teamStr) {
  const name = getCleanName(teamStr);
  const code = FLAG_CODES[name];
  if (!code) return '';
  return `<img class="flag-img" src="https://flagcdn.com/40x30/${code}.png" srcset="https://flagcdn.com/80x60/${code}.png 2x" alt="${name}" loading="lazy">`;
}

function renderMatchCard(m, idx) {
  const [date, time, t1, t2, group, city, venue, stage] = m;
  const past = stage === 'group' ? isPastMatch(m) : false;
  const live = isLiveMatch(m);
  const label = stage === 'group' ? group + '组' : STAGE_NAMES[stage];
  const stageClass = 'stage-' + stage.replace('3rd','3rd').replace('final','final');
  const story = getMatchStory(t1, t2, stage, group);

  // 小组赛：球队名前加组别
  const prefix = stage === 'group' ? `<span class="group-prefix">${group}组</span> ` : '';
  const flag1 = getFlagImg(t1);
  const flag2 = getFlagImg(t2);
  const name1 = getCleanName(t1);
  const name2 = getCleanName(t2);

  return `
    <div class="match-card ${stageClass}${past ? ' past' : ''}" data-idx="${idx}" data-group="${group}" data-stage="${stage}">
      <div class="match-meta">
        <span class="stage-badge">${label}</span>
        <span>${date} ${live ? '<span class="live-dot"></span>' : ''}${time}（北京时间）</span>
      </div>
      <div class="match-teams">
        <div class="team">${prefix}${flag1}<span class="name">${name1}</span></div>
        <div class="match-vs">${live ? '🔴 进行中' : 'VS'}</div>
        <div class="team">${prefix}${flag2}<span class="name">${name2}</span></div>
      </div>
      <div class="match-story">💬 ${story}</div>
      <div class="match-info">
        <span class="venue">📍 ${city} · ${venue}</span>
        ${live ? '<span style="color:#f44336;font-weight:700;">🔴 直播中</span>' : (past ? '<span>已结束</span>' : '<span class="time-local">⏰ ' + time + '</span>')}
      </div>
    </div>`;
}

function groupMatchesByDate(matches) {
  const map = new Map();
  for (const m of matches) {
    const key = m[0];
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(m);
  }
  return map;
}

function renderMatchList(filtered) {
  const container = document.getElementById('match-list');
  const grouped = groupMatchesByDate(filtered);

  let html = '';
  for (const [date, ms] of grouped) {
    html += `<div class="date-divider">📅 ${date}（北京时间）· ${ms.length} 场</div>`;
    ms.forEach((m, i) => {
      const globalIdx = MATCHES.indexOf(m);
      html += renderMatchCard(m, globalIdx);
    });
  }

  if (filtered.length === 0) {
    html = '<div style="text-align:center;padding:40px;color:var(--text-muted);">暂无匹配的赛事</div>';
  }

  container.innerHTML = html;
}

function renderBracket() {
  const container = document.getElementById('bracket-view');
  const stages = [
    { key: 'r32', label: '1/16 决赛', cls: 'r32', matches: matches.filter(m => m[7] === 'r32') },
    { key: 'r16', label: '1/8 决赛', cls: 'r16', matches: matches.filter(m => m[7] === 'r16') },
    { key: 'qf', label: '1/4 决赛', cls: 'qf', matches: matches.filter(m => m[7] === 'qf') },
    { key: 'sf', label: '半决赛', cls: 'sf', matches: matches.filter(m => m[7] === 'sf') },
    { key: 'final', label: '决赛 / 季军战', cls: 'final', matches: matches.filter(m => m[7] === '3rd' || m[7] === 'final') },
  ];

  let html = '<div class="bracket-container"><div class="bracket">';
  for (const s of stages) {
    html += `<div class="bracket-col ${s.cls}">`;
    html += `<div class="bracket-col-header">${s.label}<br><small>${KNOCKOUT_DATES[s.key] || ''}</small></div>`;
    for (const m of s.matches) {
      const isSpecial = m[7] === 'final' || m[7] === '3rd';
      html += `
        <div class="bracket-match">
          <div class="bm-slot">${isSpecial ? STAGE_NAMES[m[7]] : ''}</div>
          <div class="bm-teams">${m[2]} vs ${m[3]}</div>
          <div class="bm-info">${m[0]} ${m[1]} · ${m[5]}</div>
        </div>`;
    }
    html += '</div>';
  }
  html += '</div></div>';
  container.innerHTML = html;
}

function showVenueModal(venue) {
  const [flag, city, name, capacity, wikiPage] = venue;
  // 先创建弹窗
  const overlay = document.createElement('div');
  overlay.className = 'venue-modal-overlay';
  overlay.innerHTML = `
    <div class="venue-modal">
      <div class="venue-modal-header">
        <h3>${flag} ${name}</h3>
        <button class="venue-modal-close">&times;</button>
      </div>
      <div class="venue-modal-loader">📡 正在加载场馆鸟瞰图…</div>
      <div class="venue-modal-info">📍 ${city} &nbsp;|&nbsp; 🪑 容量 ${capacity} &nbsp;|&nbsp; 🏟 2026 世界杯主办场馆</div>
    </div>`;
  document.body.appendChild(overlay);

  // 关闭事件
  const close = () => overlay.remove();
  overlay.querySelector('.venue-modal-close').onclick = close;
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  document.addEventListener('keydown', function esc(e) { if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); } });

  // 直接用本地 SVG 场馆图，无需联网，秒加载
  const loader = overlay.querySelector('.venue-modal-loader');
  const slug = wikiPage.toLowerCase().replace(/%27/g,'').replace(/%26/g,'').replace(/_/g,'');
  const svgMap = {
    'estadioazteca':'azteca','metlifestadium':'metlife','attstadium':'att',
    'arrowheadstadium':'arrowhead','nrgstadium':'nrg','mercedes-benzstadium':'mercedesbenz',
    'sofistadium':'sofi','lincolnfinancialfield':'lincoln','lumenfield':'lumen',
    'levisstadium':'levis','gillettestadium':'gillette','hardrockstadium':'hardrock',
    'bcplace':'bcplace','bmofield':'bmo','estadiobbva':'bbva','estadioakron':'akron'
  };
  const imgFile = svgMap[slug] || slug;
  const img = document.createElement('img');
  img.className = 'venue-modal-img';
  img.alt = name;
  img.src = `img/${imgFile}.svg`;
  img.onload = () => { loader.replaceWith(img); };
  img.onerror = () => { loader.innerHTML = '😔 图片加载失败，请刷新重试'; };
}

  html += '<button class="filter-chip" data-group="r32">1/16 决赛</button>';
  html += '<button class="filter-chip" data-group="r16">1/8 决赛</button>';
  html += '<button class="filter-chip" data-group="qf">1/4 决赛</button>';
  html += '<button class="filter-chip" data-group="sf">半决赛</button>';
  html += '<button class="filter-chip" data-group="final">决赛</button>';
  container.innerHTML = html;

  // Bind events
  container.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      container.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeGroup = chip.dataset.group || null;
      applyFilters();
    });
  });
}

function applyFilters() {
  let filtered = [...matches];

  // Tab filter
  if (activeTab === 'group') {
    filtered = filtered.filter(m => m[7] === 'group');
  } else if (activeTab === 'knockout') {
    filtered = filtered.filter(m => m[7] !== 'group');
  }

  // Group filter
  if (activeGroup) {
    if (['r32','r16','qf','sf','final','3rd'].includes(activeGroup)) {
      const stageKey = activeGroup === 'final' ? ['final','3rd'] : [activeGroup];
      filtered = filtered.filter(m => stageKey.includes(m[7]));
    } else {
      filtered = filtered.filter(m => m[4] === activeGroup);
    }
  }

  // Update visibility
  document.getElementById('match-list').style.display = activeTab === 'venues' ? 'none' : 'block';
  document.getElementById('bracket-view').style.display = activeTab === 'knockout' ? 'block' : 'none';
  document.getElementById('venue-view').style.display = activeTab === 'venues' ? 'block' : 'none';
  document.getElementById('filter-groups').style.display = activeTab === 'venues' ? 'none' : 'flex';

  if (activeTab === 'venues') {
    renderVenues();
  } else {
    renderMatchList(filtered);
    if (activeTab === 'knockout') renderBracket();
  }

  // Update stats
  const now = getNowBJ();
  const pastCount = matches.filter(m => isPastMatch(m)).length;
  const total = matches.length;
  document.getElementById('stats').innerHTML = `
    <span>📊 共 <b>${filtered.length}</b> 场</span>
    <span>✅ 已赛 <b>${pastCount}</b> 场</span>
    <span>⏳ 待赛 <b>${total - pastCount}</b> 场</span>
    <span>🏟 总 <b>${total}</b> 场</span>
  `;
}

// ===== COUNTDOWN =====
function updateCountdown() {
  // Opening match: June 12 Beijing time 03:00 = June 11 19:00 UTC
  const openingBJ = new Date(2026, 5, 12, 3, 0, 0); // June 12, 2026 03:00 Beijing
  const nowBJ = getNowBJ();
  const diff = openingBJ - nowBJ;

  if (diff <= 0) {
    document.getElementById('cd-days').textContent = '0';
    document.getElementById('cd-hours').textContent = '0';
    document.getElementById('cd-mins').textContent = '0';
    document.getElementById('cd-secs').textContent = '0';
    document.getElementById('countdown-label').textContent = '🔥 世界杯已经开始！';
    return;
  }

  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  const secs = Math.floor((diff % 60000) / 1000);

  document.getElementById('cd-days').textContent = days;
  document.getElementById('cd-hours').textContent = String(hours).padStart(2,'0');
  document.getElementById('cd-mins').textContent = String(mins).padStart(2,'0');
  document.getElementById('cd-secs').textContent = String(secs).padStart(2,'0');
}

// ===== INIT =====
function init() {
  renderFilterChips();
  applyFilters();
  updateCountdown();
  setInterval(updateCountdown, 1000);

  // Refresh every 60s for live status
  setInterval(applyFilters, 60000);

  // Tab switching
  document.getElementById('tabs').addEventListener('click', (e) => {
    if (e.target.classList.contains('tab')) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      activeTab = e.target.dataset.tab;
      applyFilters();
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
