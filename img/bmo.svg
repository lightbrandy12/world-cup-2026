<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c62828"/>
      <stop offset="100%" style="stop-color:#ef5350"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#g)"/>
  <!-- 球场轮廓 -->
  <ellipse cx="400" cy="250" rx="200" ry="120" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="2"/>
  <line x1="400" y1="0" x2="400" y2="500" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  <circle cx="400" cy="250" r="4" fill="rgba(255,255,255,.3)"/>
  <!-- 观众席纹理 -->
  <rect x="50" y="200" width="700" height="20" rx="10" fill="rgba(255,255,255,.06)"/>
  <rect x="80" y="240" width="640" height="20" rx="10" fill="rgba(255,255,255,.06)"/>
  <rect x="50" y="280" width="700" height="20" rx="10" fill="rgba(255,255,255,.06)"/>
  <!-- 文字 -->
  <text x="400" y="420" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700" fill="rgba(255,255,255,.9)">BMO Field</text>
  <text x="400" y="450" text-anchor="middle" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,.6)">2026 FIFA World Cup Venue</text>
</svg>
